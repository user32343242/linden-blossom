name = "linden-blossom-api"
main = "src/index.js"
compatibility_date = "2024-09-23"

# KV Namespace: счётчик заказов
[[kv_namespaces]]
binding = "ORDERS_META"     # имя переменной в коде Worker
id      = "77b5cf56e3ef4c3daea1ea7d53bca521" # ID из Dashboard

# KV Namespace: JSON букетов
[[kv_namespaces]]
binding = "BOUQUETS_STORE"
id      = "95fbf5d4b2f649d2b79ad6cb6c1d6b51"

# D1 SQLite: заказы
[[d1_databases]]
binding      = "DB"
database_name = "linden_orders"
database_id  = "be2ef2c2-1689-4a04-b518-bb0b58ec4cf6"

# Переменные среды (секреты через `wrangler secret put`)
[vars]
ADMIN_USER   = "admin"
CORS_ORIGIN  = "https://linden-blossom.pages.dev"