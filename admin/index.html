<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Linden Blossom — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000000; --charcoal: #0f0f0f; --graphite: #1c1c1c; --ink: #101010;
      --slate: #4a4a4a; --silver: #9ca3af; --pearl: #f5f5f0; --white: #ffffff;
      --linden: #c8d83a; --linden-dark: #a8b82a; --linden-deep: #8a9a1f;
      --linden-light: #eef5d0; --linden-ghost: #c8d83a69;
      --gold: #c9a227; --gold-dark: #a88520; --gold-light: #faf0d0;
      --bg: var(--pearl); --card: var(--white); --fg: var(--charcoal);
      --fg-muted: #6b7280; --border: #e5e5e0;
      --shadow-sm: 0 2px 8px rgba(10, 10, 10, 0.06); --shadow-md: 0 8px 24px rgba(10, 10, 10, 0.08);
      --shadow-lg: 0 16px 40px rgba(10, 10, 10, 0.12); --shadow-xl: 0 28px 64px rgba(10, 10, 10, 0.18);
      --shadow-float: 0 30px 60px rgba(0, 0, 0, 0.35);
      --radius: 12px; --radius-lg: 20px; --radius-xl: 28px; --radius-float: 32px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; background-image: radial-gradient(circle at 10% 20%, rgba(200, 216, 58, 0.04) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(201, 162, 39, 0.03) 0%, transparent 40%); }
    .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; background: radial-gradient(ellipse at top left, #2d2d2d 0%, transparent 50%), radial-gradient(ellipse at bottom right, #1a1a1a 0%, transparent 50%), linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2d2d2d 100%); position: relative; overflow: hidden; }
    .login-wrapper::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.04) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03) 0%, transparent 40%); pointer-events: none; }
    .login-box { position: relative; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); padding: 48px; border-radius: var(--radius-float); border: 1px solid rgba(255, 255, 255, 0.08); max-width: 440px; width: 100%; box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5); }
    .login-header { text-align: center; margin-bottom: 40px; }
    .login-logo { width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 20px; background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .login-title { font-size: 26px; font-weight: 700; color: #ffffff; letter-spacing: -0.02em; margin-bottom: 6px; }
    .login-subtitle { font-size: 14px; color: #9ca3af; font-weight: 400; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: #9ca3af; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
    .form-input { width: 100%; padding: 14px 18px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); color: #ffffff; font-size: 15px; font-family: inherit; transition: all 0.3s ease; }
    .form-input::placeholder { color: #6b7280; }
    .form-input:focus { outline: none; border-color: rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 0 4px rgba(255,255,255,0.05); }
    .btn-login { width: 100%; padding: 15px; background: #ffffff; color: #0a0a0a; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-top: 8px; letter-spacing: -0.01em; font-family: inherit; }
    .btn-login:hover { background: #f5f5f0; transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.3); }
    .layout { min-height: 100vh; position: relative; }
    .sidebar { width: 270px; background: var(--black); padding: 28px 24px; position: fixed; top: 1%; left: 1%; height: 98%; overflow-y: auto; z-index: 100; border-radius: var(--radius-float); box-shadow: var(--shadow-float); border: 1px solid rgba(255, 255, 255, 0.04); }
    .sidebar::-webkit-scrollbar { width: 4px; } .sidebar::-webkit-scrollbar-track { background: transparent; } .sidebar::-webkit-scrollbar-thumb { background: #2d2d2d; border-radius: 4px; }
    .sidebar-header { padding: 4px 8px 28px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 24px; }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; }
    .sidebar-logo-icon { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--linden) 0%, var(--gold) 100%); display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 6px 16px rgba(200, 216, 58, 0.3); }
    .sidebar-logo-text { font-size: 18px; font-weight: 800; color: #ffffff; letter-spacing: -0.02em; }
    .sidebar-logo-sub { font-size: 10px; color: var(--silver); font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 16px; color: var(--silver); font-weight: 500; font-size: 14px; cursor: pointer; margin-bottom: 6px; transition: all 0.25s ease; }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: #ffffff; transform: translateX(2px); }
    .nav-item.active { background: linear-gradient(135deg, var(--linden) 0%, var(--gold) 100%); color: var(--black); font-weight: 700; box-shadow: 0 8px 20px rgba(200, 216, 58, 0.25); }
    .nav-item-icon { font-size: 18px; width: 22px; text-align: center; }
    .main { margin-left: calc(270px + 1% + 20px); padding: calc(1% + 90px) 20px 40px 20px; min-height: 100vh; }
    .topbar { background: var(--black); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 1%; left: calc(270px + 1% + 20px); right: 1%; z-index: 50; border-radius: var(--radius-float); box-shadow: var(--shadow-float); border: 1px solid rgba(255, 255, 255, 0.04); gap: 16px; }
    .topbar-left { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .menu-toggle { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--white); }
    .search-box { position: relative; flex: 1; max-width: 420px; }
    .search-box input { width: 100%; padding: 12px 16px 12px 44px; border: none; border-radius: 16px; background: var(--ink); color: var(--linden); font-size: 15px; font-family: inherit; transition: all 0.25s ease; }
    .search-box input::placeholder { color: var(--linden-ghost); }
    .search-box input:focus { outline: none; background: #000; box-shadow: 0 0 0 2px var(--linden-ghost); color: var(--linden); }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--linden-ghost); font-size: 15px; pointer-events: none; }
    .btn-icon { width: 44px; height: 44px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); background: var(--ink); color: var(--silver); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.25s ease; flex-shrink: 0; }
    .btn-icon:hover { background: #000; border-color: var(--linden); color: var(--linden); transform: translateY(-2px); }
    .content { max-width: 1600px; margin: 0 auto; }
    .page-header { margin-bottom: 28px; }
    .page-title { font-size: 34px; font-weight: 800; letter-spacing: -0.03em; color: var(--black); margin-bottom: 6px; }
    .page-subtitle { color: var(--fg-muted); font-size: 14px; font-weight: 400; }
    .float-panel { background: var(--card); border-radius: var(--radius-xl); padding: 28px; box-shadow: var(--shadow-md); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .float-panel:hover { box-shadow: var(--shadow-xl); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 26px; position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--shadow-sm); }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--linden), var(--gold)); opacity: 0; transition: opacity 0.3s ease; }
    .stat-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-xl); border-color: var(--linden-light); }
    .stat-card:hover::before { opacity: 1; }
    .stat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .stat-icon { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .stat-icon.total { background: linear-gradient(135deg, var(--linden-light) 0%, var(--gold-light) 100%); color: var(--black); }
    .stat-icon.new { background: linear-gradient(135deg, var(--linden-light) 0%, var(--linden) 100%); color: var(--linden-deep); }
    .stat-icon.confirmed { background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%); color: var(--gold-dark); }
    .stat-icon.done { background: linear-gradient(135deg, #e8e8e8 0%, #cfcfcf 100%); color: var(--slate); }
    .stat-label { font-size: 11px; color: var(--fg-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .stat-value { font-size: 36px; font-weight: 800; color: var(--black); letter-spacing: -0.03em; }
    .view-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
    .view-switcher { display: flex; gap: 4px; background: var(--black); border-radius: 16px; padding: 4px; box-shadow: var(--shadow-md); }
    .view-btn { padding: 10px 20px; border: none; background: none; border-radius: 12px; cursor: pointer; color: var(--silver); font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: all 0.25s ease; font-family: inherit; }
    .view-btn:hover { color: #ffffff; }
    .view-btn.active { background: linear-gradient(135deg, var(--linden) 0%, var(--gold) 100%); color: var(--black); box-shadow: 0 4px 12px rgba(200, 216, 58, 0.3); }
    .filter-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .filter-select { padding: 10px 16px; border: 1px solid var(--border); border-radius: 12px; background: var(--white); color: var(--fg); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.25s ease; font-weight: 500; }
    .filter-select:focus { outline: none; border-color: var(--linden); box-shadow: 0 0 0 3px var(--linden-light); }
    .btn-primary { padding: 11px 22px; background: var(--black); color: var(--linden); border: none; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; box-shadow: var(--shadow-md); }
    .btn-primary:hover { background: linear-gradient(135deg, var(--linden) 0%, var(--gold) 100%); color: var(--black); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(200, 216, 58, 0.25); }
    .table-container { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-md); }
    .table-wrapper { overflow-x: auto; } table { width: 100%; border-collapse: collapse; }
    thead { background: var(--pearl); border-bottom: 2px solid var(--border); }
    th { padding: 18px 24px; text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate); }
    td { padding: 20px 24px; border-bottom: 1px solid var(--border); font-size: 14px; }
    tbody tr { transition: all 0.25s ease; } tbody tr:hover { background: var(--pearl); } tbody tr:last-child td { border-bottom: none; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .status-badge.new { background: var(--linden-light); color: var(--linden-deep); border: 1px solid var(--linden); }
    .status-badge.confirmed { background: var(--gold-light); color: var(--gold-dark); border: 1px solid var(--gold); }
    .status-badge.done { background: #e8e8e8; color: var(--slate); border: 1px solid #cfcfcf; }
    .status-badge.cancelled { background: #fee; color: #991b1b; border: 1px solid #fbb; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .order-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 26px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--shadow-sm); }
    .order-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-xl); border-color: var(--linden-light); }
    .order-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 12px; }
    .order-id { font-size: 11px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 4px; }
    .order-name { font-size: 18px; font-weight: 800; color: var(--black); letter-spacing: -0.02em; margin-bottom: 4px; }
    .order-phone { font-size: 13px; color: var(--fg-muted); }
    .order-card-body { margin: 16px 0; padding: 16px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .order-detail { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    .order-detail:last-child { margin-bottom: 0; } .order-detail-label { color: var(--fg-muted); font-weight: 500; }
    .order-card-footer { display: flex; gap: 8px; }
    .list-container { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-md); }
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); transition: all 0.25s ease; gap: 16px; }
    .list-item:hover { background: var(--pearl); } .list-item:last-child { border-bottom: none; }
    .list-item-left { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
    .list-item-icon { width: 52px; height: 52px; border-radius: 16px; background: linear-gradient(135deg, var(--linden-light), var(--gold-light)); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .list-item-info { min-width: 0; }
    .list-item-info h4 { font-size: 15px; font-weight: 800; color: var(--black); margin-bottom: 3px; letter-spacing: -0.01em; }
    .list-item-info p { font-size: 12px; color: var(--fg-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .action-btn { width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--border); background: var(--white); color: var(--fg-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; flex-shrink: 0; }
    .action-btn:hover { border-color: var(--linden); color: var(--black); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .action-btn.danger:hover { background: #fee; border-color: #991b1b; color: #991b1b; }
    .bouquets-container { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 28px; box-shadow: var(--shadow-md); }
    .bouquets-toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .json-editor { width: 100%; min-height: 500px; padding: 22px; border: 1px solid #1c1c1c; border-radius: var(--radius-lg); background: var(--charcoal); color: var(--linden); font-family: 'SF Mono', 'Courier New', monospace; font-size: 13px; line-height: 1.7; resize: vertical; transition: all 0.25s ease; }
    .json-editor:focus { outline: none; border-color: var(--linden); box-shadow: 0 0 0 3px var(--linden-ghost); }
    .alert { padding: 14px 18px; border-radius: 16px; margin-top: 16px; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; }
    .alert-success { background: var(--linden-light); color: var(--linden-deep); border: 1px solid var(--linden); }
    .alert-error { background: #fee; color: #991b1b; border: 1px solid #fbb; }
    .hidden { display: none !important; } .section { display: none; } .section.active { display: block; animation: fadeIn 0.3s ease; }
    @media (max-width: 1024px) { .sidebar { transform: translateX(calc(-100% - 20px)); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); } .sidebar.open { transform: translateX(0); } .main { margin-left: 0; padding: calc(1% + 90px) 16px 40px 16px; } .topbar { left: 1%; right: 1%; } .menu-toggle { display: flex; } }
    @media (max-width: 768px) { .topbar { padding: 12px 16px; } .view-controls { flex-direction: column; align-items: stretch; } .stats-grid { grid-template-columns: 1fr 1fr; } .card-grid { grid-template-columns: 1fr; } .page-title { font-size: 26px; } .content { padding: 0 4px; } }
    @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } .login-wrapper { padding: 20px; } .login-box { padding: 32px 24px; } .view-switcher { width: 100%; justify-content: space-between; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--fg-muted); font-size: 14px; }
    .spinner { width: 22px; height: 22px; border: 2.5px solid var(--border); border-top-color: var(--linden); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 10px; height: 10px; } ::-webkit-scrollbar-track { background: var(--pearl); } ::-webkit-scrollbar-thumb { background: #d4d4cf; border-radius: 10px; border: 2px solid var(--pearl); } ::-webkit-scrollbar-thumb:hover { background: var(--linden); }
  </style>
</head>
<body>
  <div id="loginWrapper" class="login-wrapper">
    <div class="login-box">
      <div class="login-header">
        <div class="login-logo">🌸</div>
        <h1 class="login-title">Linden Blossom</h1>
        <p class="login-subtitle">Admin Dashboard</p>
      </div>
      <form onsubmit="event.preventDefault(); login();">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="user" class="form-input" placeholder="admin" value="admin" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="pass" class="form-input" placeholder="Enter password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>
      <div id="loginError" class="alert alert-error hidden"></div>
    </div>
  </div>

  <div id="panel" class="hidden">
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <div class="sidebar-logo-icon">🌸</div>
            <div>
              <div class="sidebar-logo-text">Linden</div>
              <div class="sidebar-logo-sub">Admin Panel</div>
            </div>
          </div>
        </div>
        <nav>
          <div class="nav-item active" data-tab="orders" onclick="switchTab('orders')">
            <span class="nav-item-icon">📦</span><span>Orders</span>
          </div>
          <div class="nav-item" data-tab="bouquets" onclick="switchTab('bouquets')">
            <span class="nav-item-icon">🌹</span><span>Bouquets</span>
          </div>
        </nav>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="topbar-left">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="Search orders, bouquets..." oninput="searchOrders()">
            </div>
          </div>
          <div class="topbar-right">
            <button class="btn-icon" id="soundToggleBtn" onclick="toggleSounds()" title="Enable Sounds">🔇</button>
            <button class="btn-icon" onclick="logout()" title="Logout">🚪</button>
          </div>
        </div>

        <div class="content">
          <section id="orders" class="section active">
            <div class="page-header">
              <h1 class="page-title">Orders Management</h1>
              <p class="page-subtitle">Manage and track all customer orders</p>
            </div>

            <div class="stats-grid">
              <div class="stat-card fade-in">
                <div class="stat-header">
                  <div><div class="stat-label">Total Orders</div><div class="stat-value" id="statTotal">0</div></div>
                  <div class="stat-icon total">📊</div>
                </div>
              </div>
              <div class="stat-card fade-in">
                <div class="stat-header">
                  <div><div class="stat-label">New Orders</div><div class="stat-value" id="statNew">0</div></div>
                  <div class="stat-icon new">🆕</div>
                </div>
              </div>
              <div class="stat-card fade-in">
                <div class="stat-header">
                  <div><div class="stat-label">Confirmed</div><div class="stat-value" id="statConfirmed">0</div></div>
                  <div class="stat-icon confirmed">✓</div>
                </div>
              </div>
              <div class="stat-card fade-in">
                <div class="stat-header">
                  <div><div class="stat-label">Completed</div><div class="stat-value" id="statDone">0</div></div>
                  <div class="stat-icon done">✓</div>
                </div>
              </div>
            </div>

            <div class="view-controls">
              <div class="view-switcher">
                <button class="view-btn active" data-view="table" onclick="switchView('table')"><span>▦</span><span>Table</span></button>
                <button class="view-btn" data-view="card" onclick="switchView('card')"><span>◫</span><span>Cards</span></button>
                <button class="view-btn" data-view="list" onclick="switchView('list')"><span>≡</span><span>List</span></button>
              </div>
              <div class="filter-controls">
                <select class="filter-select" id="statusFilter" onchange="filterOrders()">
                  <option value="">All Status</option>
                  <option value="new">New</option>
                  <option value="confirmed">Confirmed</option>
                  <option value="done">Done</option>
                  <option value="cancelled">Cancelled</option>
                </select>
                <button class="btn-primary" onclick="refreshOrders()"><span>↻</span><span>Refresh</span></button>
              </div>
            </div>

            <div id="ordersContainer"><div class="loading"><div class="spinner"></div><span>Loading orders...</span></div></div>
            <div id="ordersError" class="alert alert-error hidden"></div>
          </section>

          <section id="bouquets" class="section">
            <div class="page-header">
              <h1 class="page-title">Bouquets Management</h1>
              <p class="page-subtitle">Edit and manage your bouquet catalog</p>
            </div>
            <div class="bouquets-container">
              <div class="bouquets-toolbar">
                <button class="btn-primary" onclick="refreshBouquets()"><span>↻</span><span>Refresh</span></button>
                <button class="btn-primary" onclick="formatBouquets()"><span>✦</span><span>Format</span></button>
                <button class="btn-primary" onclick="saveBouquets()"><span>✓</span><span>Save</span></button>
              </div>
              <textarea id="bouquetsEditor" class="json-editor" placeholder="Loading bouquets..."></textarea>
              <div id="bouquetsError" class="alert alert-error hidden"></div>
              <div id="bouquetsSuccess" class="alert alert-success hidden"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script>
    let auth = '';
    let orders = [];
    let currentView = 'table';

    // --- ЗВУКОВАЯ СИСТЕМА ---
    let knownOrders = {};
    let lastUpdateTime = Date.now();
    let soundsEnabled = false;
    let audioQueue = [];
    let isPlaying = false;
    let initialLoad = true;
    let soundPollInterval = null;
    let idleCheckInterval = null;

    const SOUNDS = {
      vibe_short: [
        { url: 'https://www.myinstants.com/media/sounds/scheienotification.mp3', w: 100 },
        { url: 'https://www.myinstants.com/media/sounds/atlantis-notification-mp3.mp3', w: 80 },
        { url: 'https://www.myinstants.com/media/sounds/gta-v-sound.mp3', w: 100 },
        { url: 'https://www.myinstants.com/media/sounds/funimation-2012.mp3', w: 90 },
        { url: 'https://www.myinstants.com/media/sounds/gta-v-notification.mp3', w: 95 },
        { url: 'https://www.myinstants.com/media/sounds/thx-prank-sound.mp3', w: 100 },
        { url: 'https://www.myinstants.com/media/sounds/transition-sound-effects-presented-by-mrsnooze-unknown-album-00-005-simple-swoosh.mp3', w: 95 }
      ],
      top_vibe: [
        { url: 'https://www.myinstants.com/media/sounds/tiki-tiki.mp3', w: 95 },
        { url: 'https://www.myinstants.com/media/sounds/67-gazan.mp3', w: 90 },
        { url: 'https://www.myinstants.com/media/sounds/subsciber-notificaiont.mp3', w: 100 },
        { url: 'https://www.myinstants.com/media/sounds/sms-ringtone.mp3', w: 100 },
        { url: 'https://www.myinstants.com/media/sounds/indian-song.mp3', w: 85 },
        { url: 'https://www.myinstants.com/media/sounds/yeah-boiii-i-i-i.mp3', w: 80 },
        { url: 'https://www.myinstants.com/media/sounds/run-vine-sound-effect.mp3', w: 75 },
        { url: 'https://www.myinstants.com/media/sounds/rat-dance-music.mp3', w: 65 },
        { url: 'https://www.myinstants.com/media/sounds/skibidi-toilet.mp3', w: 85 }
      ],
      vibe: [
        { url: 'https://www.myinstants.com/media/sounds/waouh-anime.mp3', w: 50 },
        { url: 'https://www.myinstants.com/media/sounds/terminator.mp3', w: 55 }
      ],
      idle: [
        { url: 'https://www.myinstants.com/media/sounds/amogus-samsung-notification.mp3', w: 100 },
        { url: 'https://www.myinstants.com/media/sounds/a-few-moments-later-sponge-bob-sfx-fun.mp3', w: 100 }
      ],
      cancelled_low: [
        { url: 'https://www.myinstants.com/media/sounds/huh-cat.mp3', w: 20 },
        { url: 'https://www.myinstants.com/media/sounds/bruh-sound-effect_WstdzdM.mp3', w: 35 },
        { url: 'https://www.myinstants.com/media/sounds/super-mario-beedoo_F3cwLoe.mp3', w: 45 },
        { url: 'https://www.myinstants.com/media/sounds/spongebob-fail.mp3', w: 50 },
        { url: 'https://www.myinstants.com/media/sounds/gotumu-sken-yokmu.mp3', w: 60 },
        { url: 'https://www.myinstants.com/media/sounds/camera-flash-sound-effect.mp3', w: 60 },
        { url: 'https://www.myinstants.com/media/sounds/bye-bye-lumi-athena-sfx.mp3', w: 60 }
      ],
      cancelled_high: [
        { url: 'https://www.myinstants.com/media/sounds/chicken-on-tree-screaming.mp3', w: 100 },
        { url: 'https://www.myinstants.com/media/sounds/gta-v-death-sound-effect-102.mp3', w: 80 },
        { url: 'https://www.myinstants.com/media/sounds/they-ask-you-how-you-are-and-you-just-have-to-say-that-youre-fine-sound-effect_IgYM1CV.mp3', w: 70 }
      ],
      confirmed: [
        { url: 'https://www.myinstants.com/media/sounds/victory_7.mp3', w: 35 },
        { url: 'https://www.myinstants.com/media/sounds/let-her-go.mp3', w: 30 },
        { url: 'https://www.myinstants.com/media/sounds/du-bist-gut-genug_O9d32Jv.mp3', w: 45 },
        { url: 'https://www.myinstants.com/media/sounds/applepay.mp3', w: 60 },
        { url: 'https://www.myinstants.com/media/sounds/netflix-beat-remix.mp3', w: 70 },
        { url: 'https://www.myinstants.com/media/sounds/sncf-remix.mp3', w: 80 },
        { url: 'https://www.myinstants.com/media/sounds/gta-san-andreas-abertura-oficial.mp3', w: 95 },
        { url: 'https://www.myinstants.com/media/sounds/skibidi-toilet.mp3', w: 85 }
      ],
      done_high: [
        { url: 'https://www.myinstants.com/media/sounds/toef-toef-toef-toef-loud-asf.mp3', w: 100 },
        { url: 'https://www.myinstants.com/media/sounds/my-movie-6_0RlWMvM.mp3', w: 100 }
      ]
    };

    function getVibe(price) {
      if (!price) return 1;
      let v = Math.round(((price - 3200) / (7800 - 3200)) * 9 + 1);
      return Math.max(1, Math.min(10, v));
    }

    function pickSound(category) {
      const items = SOUNDS[category];
      if (!items || items.length === 0) return null;
      const totalWeight = items.reduce((sum, item) => sum + item.w, 0);
      let r = Math.random() * totalWeight;
      for (let item of items) {
        if (r < item.w) return item.url;
        r -= item.w;
      }
      return items[items.length - 1].url;
    }

    function playSound(url) {
      if (!soundsEnabled || !url) return;
      audioQueue.push(url);
      if (!isPlaying) processQueue();
    }

    function processQueue() {
      if (audioQueue.length === 0) { isPlaying = false; return; }
      isPlaying = true;
      const url = audioQueue.shift();
      const audio = new Audio(url);
      audio.volume = 0.8;
      audio.play().catch(e => console.warn("Audio play blocked/failed:", e));
      audio.onended = () => processQueue();
      audio.onerror = () => processQueue();
    }

    function triggerNewOrderSound(vibe) {
      if (vibe === 10) {
        playSound(pickSound('vibe_short'));
        playSound(pickSound('top_vibe'));
      } else {
        playSound(pickSound('vibe'));
      }
    }

    function triggerStatusChangeSound(status, vibe) {
      if (status === 'cancelled') {
        if (vibe === 10) playSound(pickSound('cancelled_high'));
        else playSound(pickSound('cancelled_low'));
      } else if (status === 'confirmed') {
        playSound(pickSound('confirmed'));
      } else if (status === 'done') {
        if (vibe === 10) playSound(pickSound('done_high'));
        else playSound(pickSound('confirmed'));
      }
    }

    function toggleSounds() {
      soundsEnabled = !soundsEnabled;
      const btn = document.getElementById('soundToggleBtn');
      if (btn) {
        btn.innerHTML = soundsEnabled ? '🔊' : '🔇';
        btn.title = soundsEnabled ? 'Disable Sounds' : 'Enable Sounds';
      }
      if (soundsEnabled) {
        // Разблокировка autoplay в браузере
        const a = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEAQB8AAEAfAAABAAgAAABmYWN0BAAAAAAAAABkYXRhAAAAAA==");
        a.play().catch(()=>{});
      }
    }

    function processOrderUpdates(currentOrders) {
      let hasChanges = false;
      const currentIds = new Set();

      for (const order of currentOrders) {
        const id = String(order.id);
        currentIds.add(id);
        const price = order.price || 3200;
        const vibe = getVibe(price);
        const status = order.status;

        if (!knownOrders[id]) {
          knownOrders[id] = { status, price, vibe };
          hasChanges = true;
          if (!initialLoad) triggerNewOrderSound(vibe);
        } else {
          const oldStatus = knownOrders[id].status;
          if (oldStatus !== status) {
            knownOrders[id].status = status;
            hasChanges = true;
            if (!initialLoad) triggerStatusChangeSound(status, vibe);
          }
        }
      }

      for (const id in knownOrders) {
        if (!currentIds.has(id)) {
          delete knownOrders[id];
          hasChanges = true;
        }
      }

      if (hasChanges) lastUpdateTime = Date.now();
      if (initialLoad) initialLoad = false;
    }

    function startSoundPolling() {
      if (soundPollInterval) clearInterval(soundPollInterval);
      soundPollInterval = setInterval(() => { if (auth) refreshOrders(); }, 10000);

      if (idleCheckInterval) clearInterval(idleCheckInterval);
      idleCheckInterval = setInterval(() => {
        if (soundsEnabled && Date.now() - lastUpdateTime >= 3600 * 1000) {
          playSound(pickSound('idle'));
          lastUpdateTime = Date.now(); 
        }
      }, 60000);
    }
    // ------------------------

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function login() {
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;
      if (!u || !p) { showLoginError('Username and password required'); return; }
      auth = 'Basic ' + btoa(u + ':' + p);
      localStorage.setItem('admin_user', u);
      localStorage.setItem('admin_pass', p);
      initialLoad = true;

      fetch('/admin/orders', { headers: { Authorization: auth } })
        .then(r => { if (!r.ok) throw new Error('Invalid credentials'); return r.json(); })
        .then((d) => {
          const list = d.orders || d;
          list.forEach(o => {
              knownOrders[String(o.id)] = { status: o.status, price: o.price || 3200 };
          });
          document.getElementById('loginWrapper').classList.add('hidden');
          document.getElementById('panel').classList.remove('hidden');
          refreshOrders();
          refreshStats();
          startSoundPolling();
        })
        .catch(e => { showLoginError(e.message); auth = ''; });
    }

    function logout() {
      localStorage.removeItem('admin_user');
      localStorage.removeItem('admin_pass');
      auth = '';
      if(soundPollInterval) clearInterval(soundPollInterval);
      if(idleCheckInterval) clearInterval(idleCheckInterval);
      document.getElementById('loginWrapper').classList.remove('hidden');
      document.getElementById('panel').classList.add('hidden');
    }

    function showLoginError(msg) {
      const err = document.getElementById('loginError');
      err.textContent = '❌ ' + msg;
      err.classList.remove('hidden');
      setTimeout(() => err.classList.add('hidden'), 4000);
    }

    function switchTab(tab) {
      document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      const navItem = document.querySelector('[data-tab="' + tab + '"]');
      if (navItem) navItem.classList.add('active');
      document.getElementById(tab).classList.add('active');
      if (tab === 'bouquets') refreshBouquets();
      if (window.innerWidth <= 1024) document.getElementById('sidebar').classList.remove('open');
    }

    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      const btn = document.querySelector('[data-view="' + view + '"]');
      if (btn) btn.classList.add('active');
      renderOrders(orders);
    }

    function searchOrders() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = orders.filter(o =>
        o.name.toLowerCase().includes(q) ||
        o.phone.toLowerCase().includes(q) ||
        (o.bouquet && o.bouquet.toLowerCase().includes(q)) ||
        (o.order_id && String(o.order_id).toLowerCase().includes(q))
      );
      renderOrders(filtered);
    }

    function filterOrders() {
      const s = document.getElementById('statusFilter').value;
      const filtered = s ? orders.filter(o => o.status === s) : orders;
      renderOrders(filtered);
    }

    async function refreshOrders() {
      try {
        if (!auth) throw new Error('Not logged in');
        const r = await fetch('/admin/orders', { headers: { Authorization: auth } });
        if (!r.ok) throw new Error('Auth failed');
        const d = await r.json();
        const newOrders = d.orders || d;
        
        let dataChanged = orders.length !== newOrders.length;
        if (!dataChanged) {
            for (let i = 0; i < orders.length; i++) {
                if (orders[i].id !== newOrders[i].id || orders[i].status !== newOrders[i].status) {
                    dataChanged = true;
                    break;
                }
            }
        }
        
        orders = newOrders;
        processOrderUpdates(orders);
        
        if (dataChanged || !document.getElementById('ordersContainer').children.length) {
            renderOrders(orders);
        }
      } catch (e) { showError('ordersError', e.message); }
    }

    async function refreshStats() {
      try {
        if (!auth) return;
        const r = await fetch('/admin/stats', { headers: { Authorization: auth } });
        if (!r.ok) return;
        const s = await r.json();
        document.getElementById('statTotal').textContent = s.total || 0;
        document.getElementById('statNew').textContent = s.new || 0;
        document.getElementById('statConfirmed').textContent = s.confirmed || 0;
        document.getElementById('statDone').textContent = s.done || 0;
      } catch (e) { console.error('Stats error:', e); }
    }

    function renderOrders(list) {
      const c = document.getElementById('ordersContainer');
      if (!list.length) { c.innerHTML = '<div class="loading">No orders found</div>'; return; }
      if (currentView === 'table') c.innerHTML = renderTable(list);
      else if (currentView === 'card') c.innerHTML = renderCards(list);
      else c.innerHTML = renderList(list);
    }

    function renderTable(list) {
      let rows = '';
      for (const o of list) {
        const oid = o.order_id || o.id;
        const bouquet = o.bouquet || '—';
        rows += '<tr>' +
          '<td><strong>' + oid + '</strong></td>' +
          '<td>' + o.name + '</td>' +
          '<td>' + o.phone + '</td>' +
          '<td>' + bouquet + '</td>' +
          '<td><span class="status-badge ' + (o.status || '') + '"><span class="status-dot"></span>' + (o.status || '—') + '</span></td>' +
          '<td>' + o.created_at + '</td>' +
          '<td><div style="display:flex;gap:8px;align-items:center;">' +
            '<select class="filter-select" onchange="updateStatus(' + o.id + ',this.value)" style="min-width:130px;">' +
              '<option value="new"' + (o.status === 'new' ? ' selected' : '') + '>New</option>' +
              '<option value="confirmed"' + (o.status === 'confirmed' ? ' selected' : '') + '>Confirmed</option>' +
              '<option value="done"' + (o.status === 'done' ? ' selected' : '') + '>Done</option>' +
              '<option value="cancelled"' + (o.status === 'cancelled' ? ' selected' : '') + '>Cancelled</option>' +
            '</select>' +
            '<button class="action-btn danger" onclick="deleteOrder(' + o.id + ')" title="Delete">🗑</button>' +
          '</div></td></tr>';
      }
      return '<div class="table-container fade-in"><div class="table-wrapper"><table><thead><tr>' +
        '<th>Order ID</th><th>Customer</th><th>Phone</th><th>Bouquet</th>' +
        '<th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>' + rows +
        '</tbody></table></div></div>';
    }

    function renderCards(list) {
      let cards = '';
      for (const o of list) {
        cards += '<div class="order-card">' +
          '<div class="order-card-header"><div>' +
            '<div class="order-id">Order #' + (o.order_id || o.id) + '</div>' +
            '<div class="order-name">' + o.name + '</div>' +
            '<div class="order-phone">📞 ' + o.phone + '</div>' +
          '</div>' +
          '<span class="status-badge ' + (o.status || '') + '"><span class="status-dot"></span>' + (o.status || '—') + '</span></div>' +
          '<div class="order-card-body">' +
            '<div class="order-detail"><span class="order-detail-label">Bouquet</span><span>' + (o.bouquet || '—') + '</span></div>' +
            '<div class="order-detail"><span class="order-detail-label">Message</span><span>' + (o.message || '—') + '</span></div>' +
            '<div class="order-detail"><span class="order-detail-label">Date</span><span>' + o.created_at + '</span></div>' +
          '</div>' +
          '<div class="order-card-footer">' +
            '<select class="filter-select" onchange="updateStatus(' + o.id + ',this.value)" style="flex:1;">' +
              '<option value="new"' + (o.status === 'new' ? ' selected' : '') + '>New</option>' +
              '<option value="confirmed"' + (o.status === 'confirmed' ? ' selected' : '') + '>Confirmed</option>' +
              '<option value="done"' + (o.status === 'done' ? ' selected' : '') + '>Done</option>' +
              '<option value="cancelled"' + (o.status === 'cancelled' ? ' selected' : '') + '>Cancelled</option>' +
            '</select>' +
            '<button class="action-btn danger" onclick="deleteOrder(' + o.id + ')">🗑</button>' +
          '</div></div>';
      }
      return '<div class="card-grid fade-in">' + cards + '</div>';
    }

    function renderList(list) {
      let items = '';
      for (const o of list) {
        items += '<div class="list-item">' +
          '<div class="list-item-left"><div class="list-item-icon">📦</div>' +
          '<div class="list-item-info"><h4>' + o.name + '</h4>' +
          '<p>📞 ' + o.phone + ' · 🌸 ' + (o.bouquet || 'No bouquet') + ' · 📅 ' + o.created_at + '</p></div></div>' +
          '<div class="list-item-right">' +
            '<span class="status-badge ' + (o.status || '') + '"><span class="status-dot"></span>' + (o.status || '—') + '</span>' +
            '<select class="filter-select" onchange="updateStatus(' + o.id + ',this.value)">' +
              '<option value="new"' + (o.status === 'new' ? ' selected' : '') + '>New</option>' +
              '<option value="confirmed"' + (o.status === 'confirmed' ? ' selected' : '') + '>Confirmed</option>' +
              '<option value="done"' + (o.status === 'done' ? ' selected' : '') + '>Done</option>' +
              '<option value="cancelled"' + (o.status === 'cancelled' ? ' selected' : '') + '>Cancelled</option>' +
            '</select>' +
            '<button class="action-btn danger" onclick="deleteOrder(' + o.id + ')">🗑</button>' +
          '</div></div>';
      }
      return '<div class="list-container fade-in">' + items + '</div>';
    }

    async function updateStatus(id, status) {
      if (!status) return;
      try {
        const r = await fetch('/admin/orders/' + id, {
          method: 'PATCH',
          headers: { Authorization: auth, 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: status })
        });
        if (!r.ok) throw new Error('Update failed');
        refreshOrders(); refreshStats();
      } catch (e) { showError('ordersError', e.message); }
    }

    async function deleteOrder(id) {
      if (!confirm('Delete this order?')) return;
      try {
        const r = await fetch('/admin/orders/' + id, { method: 'DELETE', headers: { Authorization: auth } });
        if (!r.ok) throw new Error('Delete failed');
        refreshOrders(); refreshStats();
      } catch (e) { showError('ordersError', e.message); }
    }

    async function refreshBouquets() {
      try {
        if (!auth) throw new Error('Not logged in');
        const r = await fetch('/admin/bouquets', { headers: { Authorization: auth } });
        if (!r.ok) throw new Error('Auth failed');
        document.getElementById('bouquetsEditor').value = JSON.stringify(await r.json(), null, 2);
      } catch (e) { showError('bouquetsError', e.message); }
    }

    function formatBouquets() {
      try {
        const e = document.getElementById('bouquetsEditor');
        e.value = JSON.stringify(JSON.parse(e.value), null, 2);
        hideError('bouquetsError');
      } catch (e) { showError('bouquetsError', 'Invalid JSON: ' + e.message); }
    }

    async function saveBouquets() {
      try {
        const data = JSON.parse(document.getElementById('bouquetsEditor').value);
        const r = await fetch('/admin/bouquets', {
          method: 'PUT',
          headers: { Authorization: auth, 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!r.ok) throw new Error('Failed');
        showSuccess('bouquetsSuccess', '✓ Saved ' + data.length + ' bouquets');
        hideError('bouquetsError');
      } catch (e) { showError('bouquetsError', e.message); }
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = '❌ ' + msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function showSuccess(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function hideError(id) { document.getElementById(id).classList.add('hidden'); }

    window.addEventListener('load', () => {
      const u = localStorage.getItem('admin_user');
      const p = localStorage.getItem('admin_pass');
      if (u && p) {
        document.getElementById('user').value = u;
        document.getElementById('pass').value = p;
        initialLoad = true;
        login();
      }
    });
  </script>
</body>
</html>
