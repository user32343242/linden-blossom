<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Linden Blossom — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* 🎨 Новая палитра */
      --linden: #c8d83a;
      --linden-dark: #a8b82a;
      --linden-light: #d8e85a;
      --linden-ghost: rgba(200, 216, 58, 0.25);
      
      --black: #000000;
      --black-deep: #0a0a0f;
      --black-soft: #141418;
      
      --gold: #ffc200;
      --gold-dark: #e0a800;
      --gold-light: #ffd84d;
      --gold-ghost: rgba(255, 194, 0, 0.25);
      
      --silver: #b0b2b7;
      --silver-light: #d0d2d7;
      --silver-dark: #80828a;
      
      --white: #ffffff;
      --white-ghost: rgba(255, 255, 255, 0.85);
      
      /* 🌫️ Glassmorphism токены */
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-bg-hover: rgba(255, 255, 255, 0.07);
      --glass-bg-strong: rgba(255, 255, 255, 0.08);
      --glass-bg-panel: rgba(10, 10, 15, 0.45);
      --glass-bg-card: rgba(20, 20, 28, 0.5);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-border-hover: rgba(255, 255, 255, 0.2);
      --glass-border-linden: rgba(200, 216, 58, 0.35);
      --glass-border-gold: rgba(255, 194, 0, 0.35);
      --glass-highlight: rgba(255, 255, 255, 0.12);
      --glass-shadow: rgba(0, 0, 0, 0.4);
      --glass-shadow-linden: rgba(200, 216, 58, 0.2);
      --glass-shadow-gold: rgba(255, 194, 0, 0.2);
      
      --blur: blur(20px) saturate(180%);
      --blur-strong: blur(30px) saturate(200%);
      --blur-extreme: blur(40px) saturate(220%);
      
      --bg: #0a0a0f;
      --fg: #ffffff;
      --fg-muted: #b0b2b7;
      --fg-dim: rgba(176, 178, 183, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.4);
      --shadow-xl: 0 24px 64px rgba(0, 0, 0, 0.5);
      --shadow-glow-linden: 0 0 40px rgba(200, 216, 58, 0.25);
      --shadow-glow-gold: 0 0 40px rgba(255, 194, 0, 0.25);
      
      --radius: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-float: 32px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* 🌌 Анимированный фон с орбами для glassmorphism */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(200, 216, 58, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(255, 194, 0, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(200, 216, 58, 0.06) 0%, transparent 60%),
        linear-gradient(135deg, #0a0a0f 0%, #14141f 50%, #0a0a0f 100%);
      z-index: -2;
      animation: bgShift 20s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(200, 216, 58, 0.04) 0%, transparent 40%);
      z-index: -1;
      pointer-events: none;
    }

    @keyframes bgShift {
      0%, 100% { filter: hue-rotate(0deg); }
      50% { filter: hue-rotate(15deg); }
    }

    /* ══════════ LOGIN ══════════ */
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
      position: relative;
    }

    .login-box {
      position: relative;
      background: var(--glass-bg-panel);
      backdrop-filter: var(--blur-extreme);
      -webkit-backdrop-filter: var(--blur-extreme);
      padding: 48px;
      border-radius: var(--radius-float);
      border: 1px solid var(--glass-border);
      max-width: 440px;
      width: 100%;
      box-shadow: var(--shadow-xl), inset 0 1px 0 var(--glass-highlight);
    }

    .login-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(200, 216, 58, 0.08) 0%, transparent 40%, rgba(255, 194, 0, 0.05) 100%);
      pointer-events: none;
    }

    .login-header { text-align: center; margin-bottom: 40px; position: relative; }

    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--linden) 0%, var(--gold) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: var(--shadow-glow-linden), var(--shadow-glow-gold);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .login-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--white) 0%, var(--silver-light) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-subtitle { font-size: 14px; color: var(--silver); font-weight: 400; }

    .form-group { margin-bottom: 20px; position: relative; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--silver);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      color: var(--white);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-input::placeholder { color: var(--fg-dim); }

    .form-input:focus {
      outline: none;
      border-color: var(--linden);
      background: var(--glass-bg-hover);
      box-shadow: 0 0 0 4px var(--linden-ghost), var(--shadow-glow-linden);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--linden) 0%, var(--gold) 100%);
      color: var(--black);
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 8px;
      letter-spacing: 0.02em;
      font-family: inherit;
      box-shadow: var(--shadow-glow-linden);
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold) 0%, var(--linden) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow-linden), var(--shadow-glow-gold);
    }

    .btn-login:hover::before { opacity: 1; }
    .btn-login span { position: relative; z-index: 1; }

    /* ══════════ LAYOUT ══════════ */
    .layout { min-height: 100vh; position: relative; }

    .sidebar {
      width: 270px;
      background: var(--glass-bg-panel);
      backdrop-filter: var(--blur-extreme);
      -webkit-backdrop-filter: var(--blur-extreme);
      padding: 28px 24px;
      position: fixed;
      top: 1%;
      left: 1%;
      height: 98%;
      overflow-y: auto;
      z-index: 100;
      border-radius: var(--radius-float);
      box-shadow: var(--shadow-xl), inset 0 1px 0 var(--glass-highlight);
      border: 1px solid var(--glass-border);
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 4px; }

    .sidebar-header {
      padding: 4px 8px 28px;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 24px;
    }

    .sidebar-logo { display: flex; align-items: center; gap: 12px; }

    .sidebar-logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--linden) 0%, var(--gold) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: var(--shadow-glow-linden);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .sidebar-logo-text {
      font-size: 19px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.02em;
    }

    .sidebar-logo-sub {
      font-size: 10px;
      color: var(--silver);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      color: var(--silver);
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 6px;
      transition: all 0.25s ease;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      background: var(--glass-bg-hover);
      color: var(--white);
      border-color: var(--glass-border-hover);
      backdrop-filter: var(--blur);
    }

    .nav-item.active {
      background: linear-gradient(135deg, rgba(200, 216, 58, 0.2) 0%, rgba(255, 194, 0, 0.15) 100%);
      color: var(--linden);
      font-weight: 700;
      border-color: var(--glass-border-linden);
      box-shadow: inset 0 1px 0 var(--glass-highlight), 0 8px 24px var(--glass-shadow-linden);
    }

    .nav-item-icon { font-size: 18px; width: 22px; text-align: center; }

    .main {
      margin-left: calc(270px + 1% + 20px);
      padding: calc(1% + 90px) 20px 40px 20px;
      min-height: 100vh;
    }

    /* ══════════ TOPBAR ══════════ */
    .topbar {
      background: var(--glass-bg-panel);
      backdrop-filter: var(--blur-extreme);
      -webkit-backdrop-filter: var(--blur-extreme);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 1%;
      left: calc(270px + 1% + 20px);
      right: 1%;
      z-index: 50;
      border-radius: var(--radius-float);
      box-shadow: var(--shadow-lg), inset 0 1px 0 var(--glass-highlight);
      border: 1px solid var(--glass-border);
      gap: 16px;
    }

    .topbar-left { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--white);
    }

    .search-box { position: relative; flex: 1; max-width: 420px; }

    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      color: var(--white);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.25s ease;
    }

    .search-box input::placeholder { color: var(--fg-dim); }

    .search-box input:focus {
      outline: none;
      background: var(--glass-bg-hover);
      border-color: var(--linden);
      box-shadow: 0 0 0 3px var(--linden-ghost);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--silver);
      font-size: 15px;
      pointer-events: none;
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      color: var(--silver);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .btn-icon:hover {
      background: var(--glass-bg-hover);
      border-color: var(--linden);
      color: var(--linden);
      transform: translateY(-2px);
      box-shadow: 0 0 20px var(--glass-shadow-linden);
    }

    /* ══════════ CONTENT ══════════ */
    .content { max-width: 1600px; margin: 0 auto; }
    .page-header { margin-bottom: 28px; }

    .page-title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--white) 0%, var(--linden) 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .page-subtitle { color: var(--silver); font-size: 14px; font-weight: 400; }

    .float-panel {
      background: var(--glass-bg-panel);
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: var(--shadow-md), inset 0 1px 0 var(--glass-highlight);
      border: 1px solid var(--glass-border);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .float-panel:hover {
      box-shadow: var(--shadow-xl), inset 0 1px 0 var(--glass-highlight);
      border-color: var(--glass-border-hover);
    }

    /* ══════════ STATS ══════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--glass-bg-card);
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 26px;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-md), inset 0 1px 0 var(--glass-highlight);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--linden), var(--gold));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200, 216, 58, 0.05) 0%, transparent 40%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-xl), inset 0 1px 0 var(--glass-highlight);
      border-color: var(--glass-border-linden);
    }

    .stat-card:hover::before { opacity: 1; }
    .stat-card:hover::after { opacity: 1; }

    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      background: var(--glass-bg-strong);
      backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
    }

    .stat-icon.total { color: var(--linden); box-shadow: inset 0 0 20px var(--linden-ghost); }
    .stat-icon.new { color: var(--linden-light); box-shadow: inset 0 0 20px var(--linden-ghost); }
    .stat-icon.confirmed { color: var(--gold); box-shadow: inset 0 0 20px var(--gold-ghost); }
    .stat-icon.done { color: var(--silver); }

    .stat-label {
      font-size: 11px;
      color: var(--silver);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.03em;
      position: relative;
      z-index: 1;
    }

    /* ══════════ VIEW CONTROLS ══════════ */
    .view-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .view-switcher {
      display: flex;
      gap: 4px;
      background: var(--glass-bg-panel);
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      border-radius: 16px;
      padding: 4px;
      box-shadow: var(--shadow-md), inset 0 1px 0 var(--glass-highlight);
      border: 1px solid var(--glass-border);
    }

    .view-btn {
      padding: 10px 20px;
      border: none;
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      color: var(--silver);
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .view-btn:hover { color: var(--white); }

    .view-btn.active {
      background: linear-gradient(135deg, var(--linden) 0%, var(--gold) 100%);
      color: var(--black);
      box-shadow: 0 4px 16px var(--glass-shadow-linden);
    }

    .filter-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .filter-select {
      padding: 10px 16px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      color: var(--white);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.25s ease;
      font-weight: 500;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--linden);
      box-shadow: 0 0 0 3px var(--linden-ghost);
      background: var(--glass-bg-hover);
    }

    .filter-select option {
      background: var(--black-soft);
      color: var(--white);
    }

    .btn-primary {
      padding: 11px 22px;
      background: var(--glass-bg-panel);
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      color: var(--linden);
      border: 1px solid var(--glass-border-linden);
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
      box-shadow: var(--shadow-md), inset 0 1px 0 var(--glass-highlight);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--linden) 0%, var(--gold) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .btn-primary:hover {
      color: var(--black);
      border-color: transparent;
      transform: translateY(-2px);
      box-shadow: 0 10px 24px var(--glass-shadow-linden);
    }

    .btn-primary:hover::before { opacity: 1; }

    .btn-danger {
      padding: 11px 22px;
      background: rgba(255, 50, 50, 0.15);
      backdrop-filter: var(--blur-strong);
      color: #ff8080;
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .btn-danger:hover {
      background: rgba(255, 50, 50, 0.25);
      color: #fff;
      border-color: rgba(255, 80, 80, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(255, 50, 50, 0.3);
    }

    .ip-input {
      padding: 10px 14px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      color: var(--white);
      font-size: 13px;
      font-family: 'SF Mono', 'Courier New', monospace;
      width: 170px;
      transition: all 0.25s ease;
    }

    .ip-input:focus {
      outline: none;
      border-color: #ff8080;
      box-shadow: 0 0 0 3px rgba(255, 80, 80, 0.2);
    }

    .ip-input::placeholder { color: var(--fg-dim); font-family: inherit; }

    /* ══════════ TABLE ══════════ */
    .table-container {
      background: var(--glass-bg-card);
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-md), inset 0 1px 0 var(--glass-highlight);
    }

    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }

    thead {
      background: var(--glass-bg-strong);
      backdrop-filter: var(--blur);

    /* ══════════ CARDS ══════════ */

    .order-card {

    }
  </style>

<body>
  <!-- 🔥 Эквалайзер-фон -->
  <canvas id="audioVisualizer" style="position: fixed; inset: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0; transition: opacity 0.6s ease; mix-blend-mode: screen;"></canvas>

  <div id="loginWrapper" class="login-wrapper">
    <div class="login-box">
      <div class="login-header">
        <div class="login-logo">🌸</div>
        <h1 class="login-title">Linden Blossom</h1>

      </div>
      <form onsubmit="event.preventDefault(); login();">

        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="pass" class="form-input" placeholder="Enter password" autocomplete="current-password">
        </div>

      </form>
      <div id="loginError" class="alert alert-error hidden"></div>
    </div>
  </div>

  <div id="panel" class="hidden">
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <div class="sidebar-logo-icon">🌸</div>
            <div>
              <div class="sidebar-logo-text">Linden</div>
              <div class="sidebar-logo-sub">Admin Panel</div>
            </div>
          </div>
        </div>
        <nav>
          <div class="nav-item active" data-tab="orders" onclick="switchTab('orders')">
            <span class="nav-item-icon">📦</span><span>Orders</span>
          </div>
          <div class="nav-item" data-tab="bouquets" onclick="switchTab('bouquets')">
            <span class="nav-item-icon">🌹</span><span>Bouquets</span>
          </div>
        </nav>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="topbar-left">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="Search orders, bouquets..." oninput="searchOrders()">
            </div>
          </div>
          <div class="topbar-right">
            <button class="btn-icon" id="soundToggleBtn" onclick="toggleSounds()" title="Enable Sounds">🔇</button>
            <button class="btn-icon" onclick="logout()" title="Logout">🚪</button>
          </div>
        </div>

        <div class="content">
          <section id="orders" class="section active">

            <div class="stats-grid">
              <div class="stat-card fade-in">
                <div class="stat-header">
                  <div><div class="stat-label">Total Orders</div><div class="stat-value" id="statTotal">0</div></div>
                  <div class="stat-icon total">📊</div>
                </div>
              </div>
              <div class="stat-card fade-in">
                <div class="stat-header">
                  <div><div class="stat-label">New Orders</div><div class="stat-value" id="statNew">0</div></div>
                  <div class="stat-icon new">🆕</div>
                </div>
              </div>
              <div class="stat-card fade-in">
                <div class="stat-header">
                  <div><div class="stat-label">Confirmed</div><div class="stat-value" id="statConfirmed">0</div></div>
                  <div class="stat-icon confirmed">✓</div>
                </div>
              </div>
              <div class="stat-card fade-in">
                <div class="stat-header">
                  <div><div class="stat-label">Completed</div><div class="stat-value" id="statDone">0</div></div>
                  <div class="stat-icon done">✓</div>

            </div>

            <div class="view-controls">
              <div class="view-switcher">
                <button class="view-btn active" data-view="table" onclick="switchView('table')"><span>▦</span><span>Table</span></button>
                <button class="view-btn" data-view="card" onclick="switchView('card')"><span>◫</span><span>Cards</span></button>
                <button class="view-btn" data-view="list" onclick="switchView('list')"><span>≡</span><span>List</span></button>

                  <option value="">All Status</option>

                  <option value="done">Done</option>

                </select>
                <button class="btn-primary" onclick="refreshOrders()"><span>↻</span><span>Refresh</span></button>
                <input type="text" id="ipInput" class="ip-input" placeholder="IP (optional)">
                <button class="btn-danger" onclick="resetRateLimit()" title="Reset rate limit (all or by IP)">
                  <span>⚡</span><span>Reset Limit</span>
                </button>
              </div>

            <div id="ordersContainer"><div class="loading"><div class="spinner"></div><span>Loading orders...</span></div></div>
            <div id="ordersError" class="alert alert-error hidden"></div>

          </section>

          <section id="bouquets" class="section">
            <div class="page-header">
              <h1 class="page-title">Bouquets Management</h1>
              <p class="page-subtitle">Edit and manage your bouquet catalog</p>
            </div>
            <div class="bouquets-container">
              <div class="bouquets-toolbar">
                <button class="btn-primary" onclick="refreshBouquets()"><span>↻</span><span>Refresh</span></button>
                <button class="btn-primary" onclick="formatBouquets()"><span>✦</span><span>Format</span></button>
                <button class="btn-primary" onclick="saveBouquets()"><span>✓</span><span>Save</span></button>
              </div>

  <script>
    let auth = '';
    let orders = [];
    let currentView = 'table';

    let knownOrders = {};
    let lastUpdateTime = Date.now();
    let soundsEnabled = false;
    let audioQueue = [];
    let isPlaying = false;
    let initialLoad = true;
    let soundPollInterval = null;
    let idleCheckInterval = null;

    // Web Audio API для визуализации
    let audioCtx = null;
    let analyser = null;
    let dataArray = null;
    let visualizerCanvas = null;
    let visualizerCtx = null;
    let animationId = null;

    function initAudioContext() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.75;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.connect(audioCtx.destination);
        visualizerCanvas = document.getElementById('audioVisualizer');
        visualizerCtx = visualizerCanvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
      } catch (e) { console.warn('AudioContext init failed:', e); }
    }

    function resizeCanvas() {
      if (!visualizerCanvas) return;
      visualizerCanvas.width = window.innerWidth;
      visualizerCanvas.height = window.innerHeight;
    }

    function startVisualizer() {
      if (animationId || !visualizerCanvas) return;
      visualizerCanvas.style.opacity = '0.85';
      drawVisualizer();
    }

    function stopVisualizer() {
      if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
      if (visualizerCanvas) visualizerCanvas.style.opacity = '0';
    }

    function drawVisualizer() {
      if (!analyser || !visualizerCtx) return;
      animationId = requestAnimationFrame(drawVisualizer);
      analyser.getByteFrequencyData(dataArray);
      const w = visualizerCanvas.width;
      const h = visualizerCanvas.height;
      const ctx = visualizerCtx;

      ctx.fillStyle = 'rgba(10, 10, 15, 0.12)';
      ctx.fillRect(0, 0, w, h);

      let bassEnergy = 0, midEnergy = 0;
      const bassRange = Math.floor(dataArray.length * 0.15);
      const midRange = Math.floor(dataArray.length * 0.4);
      for (let i = 0; i < bassRange; i++) bassEnergy += dataArray[i];
      for (let i = bassRange; i < midRange; i++) midEnergy += dataArray[i];
      bassEnergy = bassEnergy / bassRange / 255;
      midEnergy = midEnergy / (midRange - bassRange) / 255;
      const energy = bassEnergy * 0.7 + midEnergy * 0.3;

      const pulseRadius = Math.min(w, h) * (0.3 + energy * 0.4);
      const gradient = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, pulseRadius);
      const alpha = 0.15 + energy * 0.4;
      gradient.addColorStop(0, `rgba(200, 216, 58, ${alpha})`);
      gradient.addColorStop(0.5, `rgba(255, 194, 0, ${alpha * 0.7})`);
      gradient.addColorStop(1, 'rgba(10, 10, 15, 0)');
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);

      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < 5; i++) {
        const ringEnergy = dataArray[Math.floor(i * dataArray.length / 5)] / 255;
        if (ringEnergy < 0.2) continue;
        const radius = (Math.min(w, h) * 0.2) + (i * pulseRadius / 5);
        ctx.beginPath();
        ctx.arc(w/2, h/2, radius, 0, Math.PI * 2);
        ctx.strokeStyle = i % 2 === 0 ? `rgba(200, 216, 58, ${ringEnergy * 0.5})` : `rgba(255, 194, 0, ${ringEnergy * 0.5})`;
        ctx.lineWidth = 2 + ringEnergy * 6;
        ctx.stroke();
      }

      const barCount = 32;
      const barWidth = w / barCount;
      for (let i = 0; i < barCount; i++) {
        const dataIndex = Math.floor(i * dataArray.length / barCount);
        const barHeight = (dataArray[dataIndex] / 255) * h * 0.4;
        if (barHeight < 10) continue;
        const barGradient = ctx.createLinearGradient(0, h, 0, h - barHeight);
        barGradient.addColorStop(0, `rgba(200, 216, 58, ${0.3 + (dataArray[dataIndex]/255) * 0.5})`);
        barGradient.addColorStop(1, `rgba(255, 194, 0, 0)`);
        ctx.fillStyle = barGradient;
        ctx.fillRect(i * barWidth * 0.3, h - barHeight, barWidth * 0.8, barHeight);
        ctx.fillRect(w - (i * barWidth * 0.3) - barWidth * 0.8, h - barHeight, barWidth * 0.8, barHeight);
      }

      if (bassEnergy > 0.6) {
        const particleCount = Math.floor(bassEnergy * 10);
        for (let i = 0; i < particleCount; i++) {
          const angle = Math.random() * Math.PI * 2;
          const distance = pulseRadius * (0.8 + Math.random() * 0.4);
          const px = w/2 + Math.cos(angle) * distance;
          const py = h/2 + Math.sin(angle) * distance;
          const size = 3 + Math.random() * 5;
          ctx.beginPath();
          ctx.arc(px, py, size, 0, Math.PI * 2);
          ctx.fillStyle = Math.random() > 0.5 ? `rgba(200, 216, 58, ${0.5 + Math.random() * 0.3})` : `rgba(255, 194, 0, ${0.5 + Math.random() * 0.3})`;
          ctx.shadowBlur = 20;
          ctx.shadowColor = Math.random() > 0.5 ? 'rgba(200, 216, 58, 0.8)' : 'rgba(255, 194, 0, 0.8)';
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }
      ctx.globalCompositeOperation = 'source-over';

    function getVibe(price) {
      if (!price) return 1;
      let v = Math.round(((price - 3200) / (7800 - 3200)) * 9 + 1);
      return Math.max(1, Math.min(10, v));
    }

    function pickSound(category) {
      const items = SOUNDS[category];
      if (!items || items.length === 0) return null;
      const totalWeight = items.reduce((sum, item) => sum + item.w, 0);
      let r = Math.random() * totalWeight;
      for (let item of items) {
        if (r < item.w) return item.url;
        r -= item.w;
      }
      return items[items.length - 1].url;
    }

    function playSound(url) {
      if (!soundsEnabled || !url) return;
      audioQueue.push(url);
      if (!isPlaying) processQueue();
    }

    function processQueue() {
      if (audioQueue.length === 0) { isPlaying = false; stopVisualizer(); return; }
      isPlaying = true;
      const url = audioQueue.shift();
      const audio = new Audio(url);
      audio.volume = 0.8;
      audio.crossOrigin = 'anonymous';
      if (audioCtx && analyser) {
        try {
          if (audioCtx.state === 'suspended') audioCtx.resume();
          const source = audioCtx.createMediaElementSource(audio);
          source.connect(analyser);
          startVisualizer();
        } catch (e) { console.warn('Audio routing failed:', e); }
      }
      audio.play().catch(e => console.warn("Audio play blocked/failed:", e));
      audio.onended = () => processQueue();
      audio.onerror = () => processQueue();
    }

    function triggerNewOrderSound(vibe) {
      if (vibe === 10) { playSound(pickSound('vibe_short')); playSound(pickSound('top_vibe')); }
      else playSound(pickSound('vibe'));
    }

    function triggerStatusChangeSound(status, vibe) {
      if (status === 'cancelled') {
        if (vibe === 10) playSound(pickSound('cancelled_high'));
        else playSound(pickSound('cancelled_low'));
      } else if (status === 'confirmed') {
        playSound(pickSound('confirmed'));
      } else if (status === 'done') {
        if (vibe === 10) playSound(pickSound('done_high'));
        else playSound(pickSound('confirmed'));
      }
    }

    function toggleSounds() {
      soundsEnabled = !soundsEnabled;
      const btn = document.getElementById('soundToggleBtn');
      if (btn) {
        btn.innerHTML = soundsEnabled ? '🔊' : '🔇';
        btn.title = soundsEnabled ? 'Disable Sounds' : 'Enable Sounds';
      }
      if (soundsEnabled) {
        initAudioContext();
        const a = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEAQB8AAEAfAAABAAgAAABmYWN0BAAAAAAAAABkYXRhAAAAAA==");
        a.play().catch(()=>{});
      } else stopVisualizer();
    }

    function processOrderUpdates(currentOrders) {
      let hasChanges = false;
      const currentIds = new Set();
      for (const order of currentOrders) {
        const id = String(order.id);
        currentIds.add(id);
        const price = order.price || 3200;
        const vibe = getVibe(price);
        const status = order.status;
        if (!knownOrders[id]) {
          knownOrders[id] = { status, price, vibe };
          hasChanges = true;
          if (!initialLoad) triggerNewOrderSound(vibe);
        } else {
          const oldStatus = knownOrders[id].status;
          if (oldStatus !== status) {
            knownOrders[id].status = status;
            hasChanges = true;
            if (!initialLoad) triggerStatusChangeSound(status, vibe);
          }
        }
      }
      for (const id in knownOrders) {
        if (!currentIds.has(id)) { delete knownOrders[id]; hasChanges = true; }
      }
      if (hasChanges) lastUpdateTime = Date.now();
      if (initialLoad) initialLoad = false;
    }

    function startSoundPolling() {
      if (soundPollInterval) clearInterval(soundPollInterval);
      soundPollInterval = setInterval(() => { if (auth) refreshOrders(); }, 10000);
      if (idleCheckInterval) clearInterval(idleCheckInterval);
      idleCheckInterval = setInterval(() => {
        if (soundsEnabled && Date.now() - lastUpdateTime >= 3600 * 1000) {
          playSound(pickSound('idle'));
          lastUpdateTime = Date.now();
        }
      }, 60000);
    }

    async function resetRateLimit() {
      if (!auth) { showError('ordersError', 'Not logged in'); return; }
      const ipInput = document.getElementById('ipInput');
      const ip = ipInput ? ipInput.value.trim() : '';
      const btn = event?.target?.closest('button');
      const originalHTML = btn ? btn.innerHTML : '';
      try {
        if (btn) { btn.disabled = true; btn.innerHTML = '<span>⏳</span><span>Resetting...</span>'; }
        const r = await fetch('/admin/reset-ratelimit', {
          method: 'POST',
          headers: { Authorization: auth, 'Content-Type': 'application/json' },
          body: JSON.stringify(ip ? { ip } : {})
        });
        if (!r.ok) {
          const err = await r.json().catch(() => ({ error: 'Request failed' }));
          throw new Error(err.error || 'Reset failed');
        }
        const data = await r.json();
        const msg = ip
          ? `✓ Rate limit для IP "${ip}" сброшен (удалено: ${data.deleted})`
          : `✓ Все rate limit сброшены (удалено ключей: ${data.deleted})`;
        showSuccess('ratelimitSuccess', msg);
        if (ipInput) ipInput.value = '';
      } catch (e) {
        showError('ordersError', 'Reset failed: ' + e.message);
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = originalHTML; }
      }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function login() {
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;
      if (!u || !p) { showLoginError('Username and password required'); return; }
      auth = 'Basic ' + btoa(u + ':' + p);
      localStorage.setItem('admin_user', u);
      localStorage.setItem('admin_pass', p);
      initialLoad = true;
      fetch('/admin/orders', { headers: { Authorization: auth } })
        .then(r => { if (!r.ok) throw new Error('Invalid credentials'); return r.json(); })
        .then((d) => {
          const list = d.orders || d;
          list.forEach(o => { knownOrders[String(o.id)] = { status: o.status, price: o.price || 3200 }; });
          document.getElementById('loginWrapper').classList.add('hidden');
          document.getElementById('panel').classList.remove('hidden');
          refreshOrders();
          refreshStats();
          startSoundPolling();
        })
        .catch(e => { showLoginError(e.message); auth = ''; });
    }

    function logout() {
      localStorage.removeItem('admin_user');
      localStorage.removeItem('admin_pass');
      auth = '';
      if(soundPollInterval) clearInterval(soundPollInterval);
      if(idleCheckInterval) clearInterval(idleCheckInterval);
      document.getElementById('loginWrapper').classList.remove('hidden');
      document.getElementById('panel').classList.add('hidden');
    }

    function showLoginError(msg) {
      const err = document.getElementById('loginError');
      err.textContent = '❌ ' + msg;
      err.classList.remove('hidden');
      setTimeout(() => err.classList.add('hidden'), 4000);
    }

    function switchTab(tab) {
      document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      const navItem = document.querySelector('[data-tab="' + tab + '"]');
      if (navItem) navItem.classList.add('active');
      document.getElementById(tab).classList.add('active');
      if (tab === 'bouquets') refreshBouquets();
      if (window.innerWidth <= 1024) document.getElementById('sidebar').classList.remove('open');
    }

    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      const btn = document.querySelector('[data-view="' + view + '"]');
      if (btn) btn.classList.add('active');
      renderOrders(orders);
    }

    function searchOrders() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = orders.filter(o =>
        o.name.toLowerCase().includes(q) || o.phone.toLowerCase().includes(q) ||
        (o.bouquet && o.bouquet.toLowerCase().includes(q)) ||
        (o.order_id && String(o.order_id).toLowerCase().includes(q))
      );
      renderOrders(filtered);
    }

    function filterOrders() {
      const s = document.getElementById('statusFilter').value;
      const filtered = s ? orders.filter(o => o.status === s) : orders;
      renderOrders(filtered);
    }

    async function refreshOrders() {
      try {
        if (!auth) throw new Error('Not logged in');
        const r = await fetch('/admin/orders', { headers: { Authorization: auth } });
        if (!r.ok) throw new Error('Auth failed');
        const d = await r.json();
        const newOrders = d.orders || d;
        let dataChanged = orders.length !== newOrders.length;
        if (!dataChanged) {
          for (let i = 0; i < orders.length; i++) {
            if (orders[i].id !== newOrders[i].id || orders[i].status !== newOrders[i].status) { dataChanged = true; break; }
          }
        }
        orders = newOrders;
        processOrderUpdates(orders);
        if (dataChanged || !document.getElementById('ordersContainer').children.length) renderOrders(orders);
      } catch (e) { showError('ordersError', e.message); }
    }

    async function refreshStats() {
      try {
        if (!auth) return;
        const r = await fetch('/admin/stats', { headers: { Authorization: auth } });
        if (!r.ok) return;
        const s = await r.json();
        document.getElementById('statTotal').textContent = s.total || 0;
        document.getElementById('statNew').textContent = s.new || 0;
        document.getElementById('statConfirmed').textContent = s.confirmed || 0;
        document.getElementById('statDone').textContent = s.done || 0;
      } catch (e) { console.error('Stats error:', e); }
    }

    function renderOrders(list) {
      const c = document.getElementById('ordersContainer');
      if (!list.length) { c.innerHTML = '<div class="loading">No orders found</div>'; return; }
      if (currentView === 'table') c.innerHTML = renderTable(list);
      else if (currentView === 'card') c.innerHTML = renderCards(list);
      else c.innerHTML = renderList(list);
    }

    function renderTable(list) {
      let rows = '';
      for (const o of list) {
        const oid = o.order_id || o.id;
        const bouquet = o.bouquet || '—';
        const price = o.price || 0;
        const vibe = getVibe(price);
        rows += '<tr>' +
          '<td><strong>' + oid + '</strong></td>' +
          '<td>' + o.name + '</td>' +
          '<td>' + o.phone + '</td>' +
          '<td>' + bouquet + '</td>' +
          '<td><span class="price-value">' + price.toLocaleString() + ' ₽</span><br><span class="vibe-badge">Vibe: ' + vibe + '/10</span></td>' +
          '<td><span class="status-badge ' + (o.status || '') + '"><span class="status-dot"></span>' + (o.status || '—') + '</span></td>' +
          '<td>' + o.created_at + '</td>' +
          '<td><div style="display:flex;gap:8px;align-items:center;">' +
            '<select class="filter-select" onchange="updateStatus(' + o.id + ',this.value)" style="min-width:130px;">' +
              '<option value="new"' + (o.status === 'new' ? ' selected' : '') + '>New</option>' +
              '<option value="confirmed"' + (o.status === 'confirmed' ? ' selected' : '') + '>Confirmed</option>' +
              '<option value="done"' + (o.status === 'done' ? ' selected' : '') + '>Done</option>' +
              '<option value="cancelled"' + (o.status === 'cancelled' ? ' selected' : '') + '>Cancelled</option>' +
            '</select>' +
            '<button class="action-btn danger" onclick="deleteOrder(' + o.id + ')" title="Delete">🗑</button>' +
          '</div></td></tr>';
      }
      return '<div class="table-container fade-in"><div class="table-wrapper"><table><thead><tr>' +
        '<th>Order ID</th><th>Customer</th><th>Phone</th><th>Bouquet</th>' +
        '<th>Price / Vibe</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>' + rows +
        '</tbody></table></div></div>';
    }

    function renderCards(list) {
      let cards = '';
      for (const o of list) {
        const price = o.price || 0;
        const vibe = getVibe(price);
        cards += '<div class="order-card">' +
          '<div class="order-card-header"><div>' +
            '<div class="order-id">Order #' + (o.order_id || o.id) + '</div>' +
            '<div class="order-name">' + o.name + '</div>' +
            '<div class="order-phone">📞 ' + o.phone + '</div>' +
          '</div>' +
          '<span class="status-badge ' + (o.status || '') + '"><span class="status-dot"></span>' + (o.status || '—') + '</span></div>' +
          '<div class="order-card-body">' +
            '<div class="order-detail"><span class="order-detail-label">Bouquet</span><span>' + (o.bouquet || '—') + '</span></div>' +
            '<div class="order-detail"><span class="order-detail-label">Price</span><span><strong class="price-value">' + price.toLocaleString() + ' ₽</strong> <small style="color:var(--silver);">(Vibe ' + vibe + ')</small></span></div>' +
            '<div class="order-detail"><span class="order-detail-label">Message</span><span>' + (o.message || '—') + '</span></div>' +
            '<div class="order-detail"><span class="order-detail-label">Date</span><span>' + o.created_at + '</span></div>' +
          '</div>' +
          '<div class="order-card-footer">' +
            '<select class="filter-select" onchange="updateStatus(' + o.id + ',this.value)" style="flex:1;">' +
              '<option value="new"' + (o.status === 'new' ? ' selected' : '') + '>New</option>' +
              '<option value="confirmed"' + (o.status === 'confirmed' ? ' selected' : '') + '>Confirmed</option>' +
              '<option value="done"' + (o.status === 'done' ? ' selected' : '') + '>Done</option>' +
              '<option value="cancelled"' + (o.status === 'cancelled' ? ' selected' : '') + '>Cancelled</option>' +
            '</select>' +
            '<button class="action-btn danger" onclick="deleteOrder(' + o.id + ')">🗑</button>' +
          '</div></div>';
      }
      return '<div class="card-grid fade-in">' + cards + '</div>';
    }

    function renderList(list) {
      let items = '';
      for (const o of list) {
        const price = o.price || 0;
        const vibe = getVibe(price);
        items += '<div class="list-item">' +
          '<div class="list-item-left"><div class="list-item-icon">📦</div>' +
          '<div class="list-item-info"><h4>' + o.name + '</h4>' +
          '<p>📞 ' + o.phone + ' · 🌸 ' + (o.bouquet || 'No bouquet') + ' · <span class="price-value">' + price.toLocaleString() + ' ₽</span> <small>(Vibe ' + vibe + ')</small></p></div></div>' +
          '<div class="list-item-right">' +
            '<span class="status-badge ' + (o.status || '') + '"><span class="status-dot"></span>' + (o.status || '—') + '</span>' +
            '<select class="filter-select" onchange="updateStatus(' + o.id + ',this.value)">' +
              '<option value="new"' + (o.status === 'new' ? ' selected' : '') + '>New</option>' +
              '<option value="confirmed"' + (o.status === 'confirmed' ? ' selected' : '') + '>Confirmed</option>' +
              '<option value="done"' + (o.status === 'done' ? ' selected' : '') + '>Done</option>' +
              '<option value="cancelled"' + (o.status === 'cancelled' ? ' selected' : '') + '>Cancelled</option>' +
            '</select>' +
            '<button class="action-btn danger" onclick="deleteOrder(' + o.id + ')">🗑</button>' +
          '</div></div>';
      }
      return '<div class="list-container fade-in">' + items + '</div>';
    }

    async function updateStatus(id, status) {
      if (!status) return;
      try {
        const r = await fetch('/admin/orders/' + id, {
          method: 'PATCH',
          headers: { Authorization: auth, 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: status })
        });
        if (!r.ok) throw new Error('Update failed');
        refreshOrders(); refreshStats();
      } catch (e) { showError('ordersError', e.message); }
    }

    async function deleteOrder(id) {
      if (!confirm('Delete this order?')) return;
      try {
        const r = await fetch('/admin/orders/' + id, { method: 'DELETE', headers: { Authorization: auth } });
        if (!r.ok) throw new Error('Delete failed');
        refreshOrders(); refreshStats();
      } catch (e) { showError('ordersError', e.message); }
    }

    async function refreshBouquets() {
      try {
        if (!auth) throw new Error('Not logged in');
        const r = await fetch('/admin/bouquets', { headers: { Authorization: auth } });
        if (!r.ok) throw new Error('Auth failed');
        document.getElementById('bouquetsEditor').value = JSON.stringify(await r.json(), null, 2);
      } catch (e) { showError('bouquetsError', e.message); }
    }

    function formatBouquets() {
      try {
        const e = document.getElementById('bouquetsEditor');
        e.value = JSON.stringify(JSON.parse(e.value), null, 2);
        hideError('bouquetsError');
      } catch (e) { showError('bouquetsError', 'Invalid JSON: ' + e.message); }
    }

    async function saveBouquets() {
      try {
        const data = JSON.parse(document.getElementById('bouquetsEditor').value);
        const r = await fetch('/admin/bouquets', {
          method: 'PUT',
          headers: { Authorization: auth, 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!r.ok) throw new Error('Failed');
        showSuccess('bouquetsSuccess', '✓ Saved ' + data.length + ' bouquets');
        hideError('bouquetsError');
      } catch (e) { showError('bouquetsError', e.message); }
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = '❌ ' + msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function showSuccess(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function hideError(id) { document.getElementById(id).classList.add('hidden'); }

    window.addEventListener('load', () => {
      const u = localStorage.getItem('admin_user');
      const p = localStorage.getItem('admin_pass');
      if (u && p) {
        document.getElementById('user').value = u;
        document.getElementById('pass').value = p;
        initialLoad = true;
        login();
      }
    });
  </script>
